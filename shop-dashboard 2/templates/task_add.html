{% extends "base.html" %}
{% block title %}Add Task &middot; Shop Ops{% endblock %}
{% block content %}
<h1>Add Task</h1>
<p class="subtitle">Capture a new shop operation task (restock, pack order, verify payment, etc.).</p>

<form method="post" class="form-card">
  <label>Title <span class="req">*</span>
    <input type="text" name="title" required maxlength="120"
           placeholder="e.g. Restock A5 Notebooks">
  </label>

  <label>Description
    <textarea name="description" rows="4"
              placeholder="Short description of what needs to be done"></textarea>
  </label>

  <div class="row">
    <label>Assigned to
      <select name="assigned_member_id">
        <option value="">— Unassigned —</option>
        {% for m in members %}
          <option value="{{ m.id }}">{{ m.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label>Created by
      <select name="created_by_id">
        <option value="">— Unknown —</option>
        {% for m in members %}
          <option value="{{ m.id }}">{{ m.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label>Priority
      <select name="priority">
        {% for p in priorities %}
          <option value="{{ p }}" {% if p == 'Medium' %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </label>
  </div>

  <div class="form-actions">
    <button class="btn primary" type="submit">Add Task</button>
    <a class="btn ghost" href="{{ url_for('tasks_list') }}">Cancel</a>
  </div>
</form>
{% endblock %}
