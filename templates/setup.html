<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuration · Mug Club</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">Mug Club</div>
  </header>
  <main class="container">
    <h1>Database connection required</h1>
    <p class="subtitle">Set <code>DATABASE_URL</code> to your Supabase Postgres URI (see <code>.env.example</code>), then restart the app.</p>
    <p>For Render: add the same variable in the service environment. Use the connection string from Supabase (SSL is usually included in the URI).</p>
  </main>
</body>
</html>
